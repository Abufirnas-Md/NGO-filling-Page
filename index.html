<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodConnect NGO Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
            <div class="logo">Zero<span>Waste</span></div>
            <nav class="user-types">
                <button class="active">Donor</button>
               
            </nav>
        </header>
    <main>
        
    <h1 class="logo">Food<span>Connect</span></h1>

    <!-- Card -->
    <div class="card">

        <h2>Request Food</h2>
        <p class="subtext">Fill details to request food from donors.</p>

        <form id="foodForm">

            <!-- Priority -->
            <label>Urgency</label>
            <div class="toggle-group">
                <button type="button" class="toggle active">Urgent</button>
                <button type="button" class="toggle">Normal</button>
            </div>

            <!-- Food Type -->
            <label>Food Type</label>
            <select id="foodType">
                <option>Any</option>
                <option>Vegetarian</option>
                <option>Non-Vegetarian</option>
            </select>

            <!-- Organisation -->
            <label>Organisation Name</label>
            <input type="text" id="orgName" placeholder="Enter NGO name">

            <!-- Count -->
            <label>Beneficiaries Count</label>
            <input type="number" id="count" placeholder="e.g. 60">

            <!-- Location -->
            <label>Area / Locality</label>
            <input type="text" id="area" placeholder="Enter location">

            <!-- Submit -->
            <button type="submit" class="submit-btn">Submit Request</button>

        </form>
    </main>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
