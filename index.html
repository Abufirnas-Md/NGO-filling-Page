<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodConnect NGO Request</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container">

    <h1 class="logo">Food<span>Connect</span></h1>

    <section class="card" aria-labelledby="formTitle">
        <h2 id="formTitle">Request Food Assistance</h2>
        <p class="subtext">Connect with nearby donors efficiently.</p>

        <form id="requestForm" novalidate>

            <!-- NGO -->
            <div class="field">
                <label for="org">Organisation Name</label>
                <input id="org" type="text" required>
            </div>

            <div class="field">
                <label for="phone">Contact Number</label>
                <input id="phone" type="tel" required>
            </div>

            <div class="field">
                <label for="quantity">Meal Requirement</label>
                <input id="quantity" placeholder="Meals for 20–30 people" required>
            </div>

            <div class="field">
                <label for="location">Location</label>
                <input id="location" required>
                <button type="button" class="link-btn" onclick="getLocation()">Use GPS</button>
            </div>

            <div class="field">
                <label for="delivery">Pickup Option</label>
                <select id="delivery" required>
                    <option value="">Select</option>
                    <option>We have a volunteer for pickup</option>
                    <option>Request volunteer pickup</option>
                </select>
            </div>

            <div class="field">
                <label for="notes">Additional Notes</label>
                <textarea id="notes" rows="2" required></textarea>
            </div>

            <!-- EMAIL STEP -->
            <div class="field">
                <label for="email">Official Email</label>
                <input id="email" type="email" required>
            </div>

            <!-- CAPTCHA appears AFTER email -->
            <div class="field hidden" id="captchaBox">
                <label>Enter Code: <span id="captchaText"></span></label>
                <input id="captchaInput">
            </div>

            <button id="submitBtn" disabled>Submit Request</button>

        </form>

        <!-- OTP -->
        <div id="otpBox" class="hidden">
            <h3>Verify OTP</h3>
            <input id="otpInput" placeholder="Enter OTP">
            <button onclick="verifyOTP()">Verify</button>
        </div>

        <!-- SUCCESS -->
        <div id="success" class="hidden">
            <div class="check"></div>
            <p>Request placed successfully</p>
        </div>

    </section>
</main>

<script src="script.js"></script>
</body>
</html>
