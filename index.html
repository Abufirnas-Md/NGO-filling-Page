<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZeroWaste - Request Food</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <h1><span class="black">Zero</span><span class="green">Waste</span></h1>
  <button class="donor-btn">Donor</button>
</header>


  <!-- FORM CARD -->
  <div class="card">
    <h2>Request Food</h2>
    <p class="subtitle">Fill details to request food from donors.</p>

    <!-- URGENCY -->
    <label>Urgency</label>
    <div class="toggle">
      <button class="active" onclick="setUrgency(this)">Urgent</button>
      <button onclick="setUrgency(this)">Normal</button>
    </div>

    <!-- FOOD TYPE -->
    <label>Food Type</label>
    <select>
      <option>Any</option>
      <option>Veg</option>
    </select>

    <!-- NGO NAME -->
    <label>Organisation Name</label>
    <input type="text" placeholder="Enter NGO name">

    <!-- COUNT -->
    <label>Beneficiaries Count</label>
    <input type="number" placeholder="e.g. 60">

    <!-- LOCATION -->
    <label>Place</label>
    <input type="text" placeholder="Enter location">

    <button class="submit-btn">Submit Request</button>
  </div>

</div>

<!-- AI CHAT BUTTON -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<!-- AI CHAT BOX -->
<div class="chat-box" id="chatBox">
  <div class="chat-header">AI Assistant</div>
  <div class="chat-body" id="chatBody">
    <p><b>AI:</b> Hello! Need help with food request?</p>
  </div>
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
