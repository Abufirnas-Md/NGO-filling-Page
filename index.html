<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Request | FoodConnect</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1 class="logo">Food<span>Connect</span></h1>

    <div class="card">
        <h2>Request Food Assistance</h2>
        <p class="subtext">Submit a request to connect with nearby food donors.</p>

        <form id="requestForm">

            <!-- NGO Name -->
            <label>Organisation Name</label>
            <input type="text" id="orgName" required>

            <!-- Contact -->
            <label>Contact Number (Request Coordinator)</label>
            <input type="tel" id="contact" required>

            <!-- Quantity -->
            <label>Estimated Meal Requirement</label>
            <input type="text" id="quantity" placeholder="e.g. Meals for 20–30 people" required>

            <!-- Location -->
            <label>Location</label>
            <input type="text" id="location" placeholder="Enter manually or use GPS" required>
            <button type="button" class="small-btn" onclick="getLocation()">Use Current Location</button>

            <!-- Food Preference -->
            <label>Food Preference</label>
            <select id="food" required>
                <option value="">Select</option>
                <option>Vegetarian</option>
                <option>Non-Vegetarian</option>
                <option>Any</option>
            </select>

            <!-- Delivery -->
            <label>Pickup Arrangement</label>
            <select id="delivery" required>
                <option value="">Select</option>
                <option>We have a delivery volunteer available</option>
                <option>Request volunteer pickup</option>
            </select>

            <!-- Notes -->
            <label>Additional Notes</label>
            <textarea id="notes" rows="3" required></textarea>

            <!-- Email -->
            <label>Email ID</label>
            <input type="email" id="email" required>

            <!-- CAPTCHA -->
            <label>Enter CAPTCHA: <span id="captchaText"></span></label>
            <input type="text" id="captchaInput" required>

            <button type="submit" class="submit-btn">Submit Request</button>

        </form>

        <!-- OTP Section -->
        <div id="otpSection" class="hidden">
            <h3>Enter OTP sent to email</h3>
            <input type="text" id="otpInput">
            <button onclick="verifyOTP()">Verify OTP</button>
        </div>

        <!-- Success -->
        <div id="success" class="hidden">
            <div class="tick">✔</div>
            <p>Request Submitted Successfully</p>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
